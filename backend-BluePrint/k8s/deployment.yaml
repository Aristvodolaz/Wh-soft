apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-api
  namespace: wms
  labels:
    app: wms-api
    component: backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wms-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: wms-api
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3030"
        prometheus.io/path: "/api/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: wms-api
          image: wms-platform/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3030
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wms-api-config
            - secretRef:
                name: wms-api-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - wms-api
                topologyKey: kubernetes.io/hostname
