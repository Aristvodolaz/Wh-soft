version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────
  # WMS Backend API
  # ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: wms-api
    restart: unless-stopped
    ports:
      - '3030:3030'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wms-network
    volumes:
      - api-logs:/app/logs

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-wms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wms_password}
      POSTGRES_DB: ${DB_NAME:-wms_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-wms_user} -d ${DB_NAME:-wms_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wms-network

  # ─────────────────────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - wms-network

networks:
  wms-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  api-logs:
    driver: local
