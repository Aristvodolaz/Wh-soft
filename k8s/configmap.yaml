apiVersion: v1
kind: ConfigMap
metadata:
  name: wms-api-config
  namespace: wms
  labels:
    app: wms-api
    component: backend
data:
  APP_PORT: "3030"
  APP_ENV: "production"
  DB_PORT: "5432"
  REDIS_PORT: "6379"
  DB_SSL: "true"
  THROTTLE_TTL: "60"
  THROTTLE_LIMIT: "100"
  MOBILE_PIN_EXPIRES_IN: "8h"
  JWT_EXPIRES_IN: "1h"
  JWT_REFRESH_EXPIRES_IN: "7d"
